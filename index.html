<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Anti-OCR 开放式算法流叠加工作台 v1.2</title>
    <style>
        :root { --bg: #1e1e24; --panel: #2a2a35; --accent: #ff2e63; --text: #e0e0e0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        .sidebar { width: 360px; background: var(--panel); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow-y: auto; }
        .workspace { flex: 1; background: #111; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 2px dashed #333; }
        .drop-zone { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#666; pointer-events:none; font-size: 18px; }
        canvas { max-width: 95%; max-height: 85vh; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; }
        .plugin-card { background: #343446; padding: 12px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; }
        .plugin-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .param-row { margin-bottom: 6px; font-size: 12px; color: #aaa; }
        .param-row input { width: 100%; accent-color: var(--accent); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .config-hint { font-size: 11px; color: #888; text-align: center; margin-top: -5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="margin:0; font-size:18px; color:var(--accent);">⚙️ 算法流控制台</h2>
        <div class="config-hint" id="configHint">⚙️ 状态：已启用参数自动本地记忆</div>
        
        <div id="pipelineContainer"></div>

        <button class="btn" id="copyBtn">📋 复制最终魔改图</button>
        <button class="btn" style="background:#4e4e4e;" id="downloadBtn">💾 下载安全图片</button>
        <button class="btn" style="background:#222; border:1px solid #444;" id="resetConfigBtn">🔄 恢复插件默认参数</button>
        <div id="status" style="font-size:12px; text-align:center; color:var(--accent);"></div>
    </div>

    <div class="workspace" id="dropZone">
        <div class="drop-zone" id="dropHint">拖拽图片至此处开始混淆</div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        // 开启 willReadFrequently 属性加速高频读回，消除 Chromium 性能警告
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d', { willReadFrequently: true });
        const pipelineContainer = document.getElementById('pipelineContainer');
        const status = document.getElementById('status');
        const configHint = document.getElementById('configHint');

        let originalImage = new Image();
        let loadedPlugins = []; 

        // 1. 动态加载插件列表
        const pluginFiles = [
            'plugins/shear_warp.js',
            'plugins/curve_ripple.js',
            'plugins/water_ripple.js',
            'plugins/gradient_shatter.js',
            'plugins/chroma_shuffling.js'
        ];

        // 2. 动态注入插件内核
        async function loadPlugins() {
            window.AntiOcrPlugins = []; // 保证容器干净
            for (const file of pluginFiles) {
                try {
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = `${file}?t=${Date.now()}`; 
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                    console.log(`Plugin loaded: ${file}`);
                } catch (e) {
                    console.error(`Failed to load plugin: ${file}`, e);
                }
            }
            
            // 核心重构步骤：加载完脚本后，先尝试从本地缓存还原参数
            applySavedConfig();
            // 渲染控制台 UI
            renderPluginPanels();
        }

        // 3. 【新功能】从 localStorage 读取并覆盖参数
        function applySavedConfig() {
            const savedData = localStorage.getItem('ANTI_OCR_STUDIO_CONFIG');
            if (!savedData) return;
            
            try {
                const configMap = JSON.parse(savedData);
                if (window.AntiOcrPlugins) {
                    window.AntiOcrPlugins.forEach(plugin => {
                        // 如果缓存里存了当前插件的调参数据
                        if (configMap[plugin.name]) {
                            const savedParams = configMap[plugin.name];
                            // 遍历恢复每个参数的 value
                            for (const key in plugin.params) {
                                if (savedParams[key] !== undefined) {
                                    plugin.params[key].value = savedParams[key];
                                }
                            }
                        }
                    });
                }
                configHint.innerText = "✨ 状态：已自动加载上次缓存的参数配置";
                configHint.style.color = "#00adb5";
            } catch (e) {
                console.error("读取本地配置缓存失败:", e);
                configHint.innerText = "❌ 状态：缓存配置文件解析异常";
            }
        }

        // 4. 【新功能】自动打包当前全量参数并保存到 localStorage
        function saveConfigToLocalStorage() {
            const configMap = {};
            loadedPlugins.forEach(plugin => {
                configMap[plugin.name] = {};
                for (const [key, param] of Object.entries(plugin.params)) {
                    configMap[plugin.name][key] = param.value;
                }
            });
            localStorage.setItem('ANTI_OCR_STUDIO_CONFIG', JSON.stringify(configMap));
            configHint.innerText = "💾 状态：检测到滑块变更，配置已自动实时归档";
            configHint.style.color = "#777";
        }

        // 5. 渲染插件调参面板
        function renderPluginPanels() {
            pipelineContainer.innerHTML = '';
            loadedPlugins = []; // 重置
            
            if (window.AntiOcrPlugins) {
                window.AntiOcrPlugins.forEach((plugin, index) => {
                    loadedPlugins.push(plugin);
                    
                    const card = document.createElement('div');
                    card.className = 'plugin-card';
                    
                    let paramsHtml = '';
                    for (const [key, param] of Object.entries(plugin.params)) {
                        paramsHtml += `
                            <div class="param-row">
                                <div style="display:flex; justify-content:space-between;">
                                    <span>${param.label}</span><span id="val_${index}_${key}">${param.value}</span>
                                </div>
                                <input type="range" min="${param.min}" max="${param.max}" step="${param.step}" value="${param.value}" 
                                       oninput="updateParam(${index}, '${key}', this.value)">
                            </div>`;
                    }
                    
                    card.innerHTML = `<div class="plugin-title"><span>${plugin.name}</span></div>${paramsHtml}`;
                    pipelineContainer.appendChild(card);
                });
            }
        }

        // 6. 实时参数动态更新与流式保存
        window.updateParam = function(pluginIndex, paramKey, value) {
            loadedPlugins[pluginIndex].params[paramKey].value = parseFloat(value);
            document.getElementById(`val_${pluginIndex}_${paramKey}`).innerText = value;
            
            // 1. 自动触发本地缓存记忆归档
            saveConfigToLocalStorage();
            
            // 2. 刷新图像 Pipeline
            if (originalImage.src) executePipeline();
        };

        // 7. 核心流式叠加调度引擎 (Pipeline Execution)
        function executePipeline() {
            if (!originalImage.src) return;
            
            const w = originalImage.width;
            const h = originalImage.height;
            mainCanvas.width = w;
            mainCanvas.height = h;

            ctx.drawImage(originalImage, 0, 0);

            loadedPlugins.forEach(plugin => {
                let currentImageData = ctx.getImageData(0, 0, w, h);
                let processedImageData = plugin.process(ctx, currentImageData, plugin.params);
                ctx.putImageData(processedImageData, 0, 0);
            });
        }

        // 8. 【新功能】一键清空本地缓存，恢复出厂设置
        document.getElementById('resetConfigBtn').addEventListener('click', () => {
            if (confirm("确定要放弃当前的对抗调参配置，恢复出厂默认值吗？")) {
                localStorage.removeItem('ANTI_OCR_STUDIO_CONFIG');
                location.reload(); // 刷新页面重新拉取原生默认值
            }
        });

        // 9. 拖拽及复制事件绑定
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => e.preventDefault());
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => { originalImage.src = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        originalImage.onload = function() {
            document.getElementById('dropHint').style.display = 'none';
            executePipeline();
        };

        document.getElementById('copyBtn').addEventListener('click', () => {
            if (!originalImage.src) return;
            mainCanvas.toBlob(async (blob) => {
                await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                status.innerText = "✅ 最终防御组合图已成功复制！";
                setTimeout(() => status.innerText = "", 2500);
            });
        });

        // 启动主引擎
        loadPlugins();
    </script>
</body>
</html>
